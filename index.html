<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Muswipe</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Muswipe" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --card: #1a1a1a;
      --accent: #1DB954;
      --accent2: #ff4d6d;
      --text: #f5f5f5;
      --muted: #666;
      --border: rgba(255,255,255,0.07);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
    }

    /* ─── AUTH SCREEN ─── */
    #auth-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
      gap: 0;
      padding: 40px 32px;
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .auth-logo span { color: var(--accent); }

    .auth-tagline {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 64px;
      text-transform: uppercase;
    }

    .auth-visual {
      width: 180px; height: 180px;
      border-radius: 32px;
      background: linear-gradient(135deg, #1DB954 0%, #0a5c28 100%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 48px;
      box-shadow: 0 32px 64px rgba(29,185,84,0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    .auth-visual svg { width: 80px; height: 80px; }

    .auth-btn {
      width: 100%;
      max-width: 320px;
      padding: 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .auth-btn:active { transform: scale(0.97); }

    .auth-note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 260px;
      line-height: 1.6;
    }

    /* ─── MAIN APP ─── */
    #app {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: env(safe-area-inset-top, 44px) 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, transparent 100%);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .logo span { color: var(--accent); }

    .header-tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 100px;
      padding: 4px;
    }
    .tab-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* ─── SWIPE VIEW ─── */
    #swipe-view {
      position: absolute; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cards-stack {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ─── TRACK CARD ─── */
    .track-card {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 120px);
      will-change: transform;
      transition: transform 0.05s linear;
      cursor: grab;
    }
    .track-card:active { cursor: grabbing; }

    .card-cover {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .card-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0) 30%,
        rgba(0,0,0,0.6) 60%,
        rgba(0,0,0,0.95) 100%
      );
    }

    .card-content {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 0 28px;
    }

    .card-genre {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(29,185,84,0.15);
      border: 1px solid rgba(29,185,84,0.3);
      border-radius: 100px;
      padding: 4px 12px;
      margin-bottom: 12px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .card-artist {
      font-size: 15px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }

    /* ─── MINI PLAYER ─── */
    .mini-player {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 0 28px;
      margin-bottom: 20px;
    }
    .player-bar {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(20px);
    }
    .player-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ctrl-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .ctrl-btn.play-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      color: #000;
    }
    .ctrl-btn:active { transform: scale(0.92); }

    .progress-area {
      flex: 1;
      min-width: 0;
    }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 100px;
      width: 0%;
      transition: width 1s linear;
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
    }

    /* ─── SWIPE INDICATORS ─── */
    .swipe-hint-like, .swipe-hint-skip {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
      border-radius: 16px;
      padding: 10px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      border: 3px solid;
      letter-spacing: 0.05em;
    }
    .swipe-hint-like {
      right: 32px;
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(29,185,84,0.1);
    }
    .swipe-hint-skip {
      left: 32px;
      color: var(--accent2);
      border-color: var(--accent2);
      background: rgba(255,77,109,0.1);
    }

    /* ─── ACTION BUTTONS ─── */
    .action-row {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      padding: 0 40px;
    }

    .action-btn {
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .action-btn:active { transform: scale(0.9) !important; }

    .btn-skip {
      width: 60px; height: 60px;
      background: rgba(255,77,109,0.15);
      border: 2px solid rgba(255,77,109,0.4);
      color: var(--accent2);
    }
    .btn-like {
      width: 72px; height: 72px;
      background: var(--accent);
      color: #000;
      box-shadow: 0 8px 32px rgba(29,185,84,0.4);
    }
    .btn-playlist {
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ─── PLAYLIST VIEW ─── */
    #playlist-view {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      padding-top: calc(env(safe-area-inset-top, 44px) + 80px);
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
      overflow-y: auto;
    }

    .playlist-header {
      padding: 0 24px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .playlist-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
    }
    .playlist-count {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      transition: background 0.15s;
      cursor: pointer;
    }
    .playlist-item:active { background: rgba(255,255,255,0.04); }

    .pi-thumb {
      width: 54px; height: 54px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--card);
    }
    .pi-info { flex: 1; min-width: 0; }
    .pi-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pi-artist {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .pi-remove {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .pi-remove:active { color: var(--accent2); }

    .empty-playlist {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 40px;
      text-align: center;
    }
    .empty-playlist svg { opacity: 0.3; }
    .empty-playlist p { font-size: 15px; line-height: 1.6; }

    /* ─── LOADING ─── */
    .loading-overlay {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 44px) + 16px);
      left: 50%; transform: translateX(-50%) translateY(-80px);
      background: rgba(30,30,30,0.95);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      white-space: nowrap;
      z-index: 200;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(20px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* fly-away animations */
    @keyframes flyRight {
      to { transform: translateX(120%) rotate(20deg); opacity: 0; }
    }
    @keyframes flyLeft {
      to { transform: translateX(-120%) rotate(-20deg); opacity: 0; }
    }
    .fly-right { animation: flyRight 0.4s cubic-bezier(0.4,0,1,1) forwards; }
    .fly-left  { animation: flyLeft  0.4s cubic-bezier(0.4,0,1,1) forwards; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">Mus<span>wipe</span></div>
  <div class="auth-tagline">Swipe. Discover. Vibe.</div>
  <div class="auth-visual">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 75 L20 35 L80 20 L80 60" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="30" cy="78" r="12" fill="white"/>
      <circle cx="70" cy="63" r="12" fill="white"/>
    </svg>
  </div>
  <button class="auth-btn" onclick="startAuth()">Войти через Spotify</button>
  <p class="auth-note">Нужен Spotify Premium для воспроизведения треков</p>
</div>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">Mus<span>wipe</span></div>
    <div class="header-tabs">
      <button class="tab-btn active" onclick="switchTab('swipe')">Открытия</button>
      <button class="tab-btn" onclick="switchTab('playlist')">Плейлист</button>
    </div>
  </div>

  <!-- SWIPE VIEW -->
  <div id="swipe-view">
    <div class="cards-stack" id="cards-stack">
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Загружаем треки…</div>
      </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-row" id="action-row" style="display:none">
      <button class="action-btn btn-skip" onclick="doSkip()" title="Пропустить">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <button class="action-btn btn-like" onclick="doLike()" title="В плейлист">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>
      <button class="action-btn btn-playlist" onclick="switchTab('playlist')" title="Плейлист">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- PLAYLIST VIEW -->
  <div id="playlist-view">
    <div class="playlist-header">
      <div>
        <div class="playlist-title">Мой плейлист</div>
        <div class="playlist-count" id="playlist-count">0 треков</div>
      </div>
    </div>
    <div id="playlist-items"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───
const CLIENT_ID = '2386a48de8fc4d8ea9caf923c7fda128';
const REDIRECT_URI = 'https://pthk345.github.io/Muswipe/';
const SCOPES = [
  'streaming',
  'user-read-email',
  'user-read-private',
  'user-read-playback-state',
  'user-modify-playback-state',
  'playlist-modify-public',
  'playlist-modify-private',
  'user-top-read',
  'user-read-recently-played',
].join(' ');

// ─── STATE ───
let accessToken = null;
let player = null;
let deviceId = null;
let currentTrack = null;
let trackQueue = [];
let isPlaying = false;
let progressInterval = null;
let playlistTracks = JSON.parse(localStorage.getItem('muswipe_playlist') || '[]');
let userId = null;
let searchOffset = 0;

// Swipe state
let startX = 0, startY = 0, currentX = 0;
let isDragging = false;
let activeCard = null;

// ─── AUTH ───
function startAuth() {
  const verifier = generateCodeVerifier(128);
  sessionStorage.setItem('pkce_verifier', verifier);
  generateCodeChallenge(verifier).then(challenge => {
    const params = new URLSearchParams({
      client_id: CLIENT_ID,
      response_type: 'code',
      redirect_uri: REDIRECT_URI,
      scope: SCOPES,
      code_challenge_method: 'S256',
      code_challenge: challenge,
    });
    window.location = `https://accounts.spotify.com/authorize?${params}`;
  });
}

function generateCodeVerifier(length) {
  const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let text = '';
  for (let i = 0; i < length; i++) text += possible.charAt(Math.floor(Math.random() * possible.length));
  return text;
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI,
      client_id: CLIENT_ID,
      code_verifier: verifier,
    }),
  });
  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem('muswipe_token', accessToken);
    if (data.refresh_token) localStorage.setItem('muswipe_refresh', data.refresh_token);
    return true;
  }
  return false;
}

async function refreshToken() {
  const refresh = localStorage.getItem('muswipe_refresh');
  if (!refresh) return false;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token',
      refresh_token: refresh,
      client_id: CLIENT_ID,
    }),
  });
  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem('muswipe_token', accessToken);
    return true;
  }
  return false;
}

// ─── SPOTIFY SDK ───
function loadSpotifySDK() {
  return new Promise(resolve => {
    window.onSpotifyWebPlaybackSDKReady = resolve;
    const s = document.createElement('script');
    s.src = 'https://sdk.scdn.co/spotify-player.js';
    document.head.appendChild(s);
  });
}

async function initPlayer() {
  await loadSpotifySDK();
  player = new Spotify.Player({
    name: 'Muswipe',
    getOAuthToken: cb => cb(accessToken),
    volume: 0.8,
  });

  player.addListener('ready', ({ device_id }) => {
    deviceId = device_id;
    loadTracks();
  });

  player.addListener('player_state_changed', state => {
    if (!state) return;
    isPlaying = !state.paused;
    updatePlayBtn();
    updateProgress(state);
  });

  player.connect();
}

// ─── FETCH TRACKS ───
async function spotifyFetch(url) {
  let res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (res.status === 401) {
    await refreshToken();
    res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  }
  return res.json();
}

async function loadTracks() {
  document.getElementById('loading').style.display = 'flex';

  const queries = [
    'year:2024', 'year:2023', 'genre:pop', 'genre:hip-hop',
    'genre:electronic', 'genre:indie', 'tag:new', 'tag:hipster'
  ];
  const q = queries[Math.floor(Math.random() * queries.length)];
  const offset = Math.floor(Math.random() * 500);
  const data = await spotifyFetch(
    `https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=track&limit=20&offset=${offset}&market=RU`
  );

  const tracks = (data.tracks?.items || []).filter(t => t.preview_url || true);
  trackQueue.push(...tracks);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('action-row').style.display = 'flex';

  if (trackQueue.length > 0) renderCard(trackQueue[0]);
}

// ─── RENDER CARD ───
function renderCard(track) {
  currentTrack = track;
  const stack = document.getElementById('cards-stack');

  // Remove old cards except loading
  stack.querySelectorAll('.track-card').forEach(el => el.remove());

  const img = track.album?.images?.[0]?.url || '';
  const title = track.name || 'Unknown';
  const artist = track.artists?.map(a => a.name).join(', ') || 'Unknown';
  const genre = track.album?.album_type === 'single' ? 'Single' : 'Album';
  const duration = track.duration_ms ? formatTime(track.duration_ms / 1000) : '0:00';

  const card = document.createElement('div');
  card.className = 'track-card';
  card.innerHTML = `
    <div class="card-cover" style="background-image:url('${img}')"></div>
    <div class="swipe-hint-like" id="hint-like">❤ НРАВИТСЯ</div>
    <div class="swipe-hint-skip" id="hint-skip">✕ ПРОПУСТИТЬ</div>
    <div class="card-content">
      <div class="card-genre">${genre}</div>
      <div class="card-title">${title}</div>
      <div class="card-artist">${artist}</div>
    </div>
    <div class="mini-player">
      <div class="player-bar">
        <div class="player-controls">
          <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">
            <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </button>
        </div>
        <div class="progress-area">
          <div class="progress-track" onclick="seekTo(event)">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-times">
            <span id="time-cur">0:00</span>
            <span id="time-dur">${duration}</span>
          </div>
        </div>
      </div>
    </div>
  `;

  stack.appendChild(card);
  activeCard = card;
  setupSwipe(card);
  playTrack(track.uri);
}

// ─── PLAYBACK ───
async function playTrack(uri) {
  if (!deviceId) return;
  await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${accessToken}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ uris: [uri] }),
  });
  isPlaying = true;
  updatePlayBtn();
}

async function togglePlay() {
  if (!player) return;
  await player.togglePlay();
  isPlaying = !isPlaying;
  updatePlayBtn();
}

function updatePlayBtn() {
  const btn = document.getElementById('play-icon');
  if (!btn) return;
  btn.innerHTML = isPlaying
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function updateProgress(state) {
  const fill = document.getElementById('progress-fill');
  const cur = document.getElementById('time-cur');
  const dur = document.getElementById('time-dur');
  if (!fill || !state) return;

  const pos = state.position;
  const total = state.duration;
  fill.style.width = `${(pos / total) * 100}%`;
  if (cur) cur.textContent = formatTime(pos / 1000);
  if (dur) dur.textContent = formatTime(total / 1000);
}

async function seekTo(e) {
  if (!player) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const state = await player.getCurrentState();
  if (state) player.seek(Math.floor(ratio * state.duration));
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ─── SWIPE LOGIC ───
function setupSwipe(card) {
  card.addEventListener('touchstart', onDragStart, { passive: true });
  card.addEventListener('touchmove', onDragMove, { passive: false });
  card.addEventListener('touchend', onDragEnd);
  card.addEventListener('mousedown', onDragStart);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
}

function onDragStart(e) {
  isDragging = true;
  const point = e.touches ? e.touches[0] : e;
  startX = point.clientX;
  startY = point.clientY;
  if (activeCard) activeCard.style.transition = 'none';
}

function onDragMove(e) {
  if (!isDragging || !activeCard) return;
  if (e.cancelable) e.preventDefault();
  const point = e.touches ? e.touches[0] : e;
  currentX = point.clientX - startX;
  const rotate = currentX * 0.08;
  activeCard.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

  const likeHint = document.getElementById('hint-like');
  const skipHint = document.getElementById('hint-skip');
  const threshold = 60;
  if (likeHint) likeHint.style.opacity = currentX > threshold ? Math.min((currentX - threshold) / 60, 1) : 0;
  if (skipHint) skipHint.style.opacity = currentX < -threshold ? Math.min((-currentX - threshold) / 60, 1) : 0;
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);

  if (!activeCard) return;
  activeCard.style.transition = '';

  if (currentX > 100) {
    doLike();
  } else if (currentX < -100) {
    doSkip();
  } else {
    activeCard.style.transform = '';
    const likeHint = document.getElementById('hint-like');
    const skipHint = document.getElementById('hint-skip');
    if (likeHint) likeHint.style.opacity = 0;
    if (skipHint) skipHint.style.opacity = 0;
  }
  currentX = 0;
}

function nextCard() {
  trackQueue.shift();
  if (trackQueue.length < 3) loadTracks();
  if (trackQueue.length > 0) {
    setTimeout(() => renderCard(trackQueue[0]), 300);
  }
}

function doLike() {
  if (!currentTrack || !activeCard) return;
  activeCard.classList.add('fly-right');
  addToPlaylist(currentTrack);
  showToast(`❤️ ${currentTrack.name} добавлен!`);
  setTimeout(nextCard, 400);
}

function doSkip() {
  if (!activeCard) return;
  activeCard.classList.add('fly-left');
  setTimeout(nextCard, 400);
}

// ─── PLAYLIST ───
function addToPlaylist(track) {
  if (playlistTracks.find(t => t.id === track.id)) return;
  playlistTracks.push({
    id: track.id,
    uri: track.uri,
    name: track.name,
    artist: track.artists?.map(a => a.name).join(', '),
    image: track.album?.images?.[1]?.url || track.album?.images?.[0]?.url || '',
  });
  localStorage.setItem('muswipe_playlist', JSON.stringify(playlistTracks));
  updatePlaylistView();
}

function removeFromPlaylist(id) {
  playlistTracks = playlistTracks.filter(t => t.id !== id);
  localStorage.setItem('muswipe_playlist', JSON.stringify(playlistTracks));
  updatePlaylistView();
}

function updatePlaylistView() {
  const el = document.getElementById('playlist-items');
  const count = document.getElementById('playlist-count');
  count.textContent = `${playlistTracks.length} треков`;

  if (playlistTracks.length === 0) {
    el.innerHTML = `
      <div class="empty-playlist">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <p>Листай треки и нажимай ❤️<br>— они появятся здесь</p>
      </div>`;
    return;
  }

  el.innerHTML = playlistTracks.map(t => `
    <div class="playlist-item" onclick="playFromPlaylist('${t.uri}')">
      <img class="pi-thumb" src="${t.image}" onerror="this.style.background='#222'" />
      <div class="pi-info">
        <div class="pi-title">${t.name}</div>
        <div class="pi-artist">${t.artist}</div>
      </div>
      <button class="pi-remove" onclick="event.stopPropagation(); removeFromPlaylist('${t.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  `).join('');
}

function playFromPlaylist(uri) {
  if (deviceId) playTrack(uri);
}

// ─── UI ───
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'swipe') || (i === 1 && tab === 'playlist'));
  });
  document.getElementById('swipe-view').style.display = tab === 'swipe' ? 'flex' : 'none';
  const pv = document.getElementById('playlist-view');
  pv.style.display = tab === 'playlist' ? 'flex' : 'none';
  if (tab === 'playlist') updatePlaylistView();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ───
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    window.history.replaceState({}, '', REDIRECT_URI);
    const ok = await exchangeCode(code);
    if (!ok) { alert('Ошибка авторизации. Попробуй снова.'); return; }
  } else {
    const saved = localStorage.getItem('muswipe_token');
    if (saved) {
      accessToken = saved;
      const ok = await refreshToken();
      if (!ok) { showAuthScreen(); return; }
    } else {
      showAuthScreen();
      return;
    }
  }

  showApp();
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initPlayer();
}

init();
</script>
