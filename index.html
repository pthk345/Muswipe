<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Muswipe</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Muswipe" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --accent: #1DB954;
      --accent2: #ff4d6d;
      --text: #f5f5f5;
      --muted: #666;
      --border: rgba(255,255,255,0.07);
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; overflow: hidden;
      -webkit-font-smoothing: antialiased; touch-action: none;
    }

    /* AUTH */
    #auth-screen {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: var(--bg);
      z-index: 100; padding: 40px 32px;
    }
    .auth-logo { font-family: 'Syne', sans-serif; font-size: 52px; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; }
    .auth-logo span { color: var(--accent); }
    .auth-tagline { font-size: 13px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 56px; }
    .auth-visual {
      width: 160px; height: 160px; border-radius: 32px;
      background: linear-gradient(135deg, #1DB954, #0a5c28);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 48px; box-shadow: 0 32px 64px rgba(29,185,84,0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .auth-btn {
      width: 100%; max-width: 320px; padding: 18px;
      background: var(--accent); color: #000; border: none; border-radius: 100px;
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .auth-note { margin-top: 16px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; }

    /* APP */
    #app { position: fixed; inset: 0; display: none; flex-direction: column; }

    /* HEADER */
    .header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      padding: env(safe-area-inset-top, 44px) 24px 16px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: var(--accent); }
    .header-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.05); border-radius: 100px; padding: 4px; }
    .tab-btn { padding: 6px 16px; border-radius: 100px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--accent); color: #000; font-weight: 700; }

    /* SWIPE VIEW */
    #swipe-view { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .cards-stack { position: relative; width: 100%; height: 100%; }

    /* CARD */
    .track-card {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 130px);
      will-change: transform; cursor: grab; user-select: none;
    }
    .track-card:active { cursor: grabbing; }
    .card-cover { position: absolute; inset: 0; background-size: cover; background-position: center; }
    .card-cover::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.7) 65%, rgba(0,0,0,0.97) 100%);
    }
    .card-content { position: relative; z-index: 2; width: 100%; padding: 0 28px; }
    .card-genre {
      display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); background: rgba(29,185,84,0.15);
      border: 1px solid rgba(29,185,84,0.3); border-radius: 100px; padding: 4px 12px; margin-bottom: 12px;
    }
    .card-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 6px; }
    .card-artist { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 20px; }

    /* MINI PLAYER */
    .mini-player { position: relative; z-index: 2; width: 100%; padding: 0 28px; margin-bottom: 20px; }
    .player-bar {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      backdrop-filter: blur(20px);
    }
    .ctrl-btn {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--accent); color: #000;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.15s; flex-shrink: 0;
    }
    .ctrl-btn:active { transform: scale(0.9); }
    .progress-area { flex: 1; min-width: 0; }
    .progress-track { height: 3px; background: rgba(255,255,255,0.15); border-radius: 100px; overflow: hidden; margin-bottom: 6px; cursor: pointer; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 100px; width: 0%; transition: width 0.5s linear; }
    .progress-times { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }

    /* SWIPE HINTS */
    .swipe-hint-like, .swipe-hint-skip {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 20;
      opacity: 0; pointer-events: none; border-radius: 16px; padding: 10px 20px;
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; border: 3px solid; letter-spacing: 0.05em;
    }
    .swipe-hint-like { right: 32px; color: var(--accent); border-color: var(--accent); background: rgba(29,185,84,0.1); }
    .swipe-hint-skip { left: 32px; color: var(--accent2); border-color: var(--accent2); background: rgba(255,77,109,0.1); }

    /* ACTION BUTTONS */
    .action-row {
      position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
      left: 0; right: 0; display: flex; align-items: center; justify-content: center;
      gap: 20px; z-index: 10; padding: 0 40px;
    }
    .action-btn { border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.15s; flex-shrink: 0; }
    .action-btn:active { transform: scale(0.9) !important; }
    .btn-skip { width: 60px; height: 60px; background: rgba(255,77,109,0.15); border: 2px solid rgba(255,77,109,0.4); color: var(--accent2); }
    .btn-like { width: 72px; height: 72px; background: var(--accent); color: #000; box-shadow: 0 8px 32px rgba(29,185,84,0.4); }
    .btn-playlist { width: 52px; height: 52px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); }

    /* NO PREVIEW BADGE */
    .no-preview-badge {
      display: inline-block; font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,0.06); border-radius: 100px;
      padding: 4px 10px; margin-bottom: 12px;
    }

    /* PLAYLIST */
    #playlist-view {
      position: absolute; inset: 0; display: none; flex-direction: column;
      padding-top: calc(env(safe-area-inset-top, 44px) + 80px);
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
      overflow-y: auto;
    }
    .playlist-header { padding: 0 24px 24px; }
    .playlist-title { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
    .playlist-count { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .playlist-item { display: flex; align-items: center; gap: 16px; padding: 12px 24px; cursor: pointer; transition: background 0.15s; }
    .playlist-item:active { background: rgba(255,255,255,0.04); }
    .pi-thumb { width: 54px; height: 54px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #222; }
    .pi-info { flex: 1; min-width: 0; }
    .pi-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pi-artist { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .pi-remove { width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .pi-remove:active { color: var(--accent2); }
    .empty-playlist { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); padding: 40px; text-align: center; }
    .empty-playlist p { font-size: 15px; line-height: 1.6; }

    /* LOADING */
    .loading-overlay { position: absolute; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 50; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); }

    /* TOAST */
    .toast {
      position: fixed; top: calc(env(safe-area-inset-top, 44px) + 16px);
      left: 50%; transform: translateX(-50%) translateY(-80px);
      background: rgba(30,30,30,0.95); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 20px; font-size: 13px;
      white-space: nowrap; z-index: 200; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      backdrop-filter: blur(20px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes flyRight { to { transform: translateX(120%) rotate(20deg); opacity: 0; } }
    @keyframes flyLeft  { to { transform: translateX(-120%) rotate(-20deg); opacity: 0; } }
    .fly-right { animation: flyRight 0.4s cubic-bezier(0.4,0,1,1) forwards; }
    .fly-left  { animation: flyLeft  0.4s cubic-bezier(0.4,0,1,1) forwards; }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-logo">Mus<span>wipe</span></div>
  <div class="auth-tagline">Swipe. Discover. Vibe.</div>
  <div class="auth-visual">
    <svg width="80" height="80" viewBox="0 0 100 100" fill="none">
      <path d="M20 75 L20 35 L80 20 L80 60" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="30" cy="78" r="12" fill="white"/>
      <circle cx="70" cy="63" r="12" fill="white"/>
    </svg>
  </div>
  <button class="auth-btn" onclick="startAuth()">Войти через Spotify</button>
  <p class="auth-note">Бесплатный аккаунт поддерживается — играют 30-сек превью треков</p>
</div>

<div id="app">
  <div class="header">
    <div class="logo">Mus<span>wipe</span></div>
    <div class="header-tabs">
      <button class="tab-btn active" onclick="switchTab('swipe')">Открытия</button>
      <button class="tab-btn" onclick="switchTab('playlist')">Плейлист</button>
    </div>
  </div>

  <div id="swipe-view">
    <div class="cards-stack" id="cards-stack">
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Загружаем треки…</div>
      </div>
    </div>
    <div class="action-row" id="action-row" style="display:none">
      <button class="action-btn btn-skip" onclick="doSkip()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <button class="action-btn btn-like" onclick="doLike()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>
      <button class="action-btn btn-playlist" onclick="switchTab('playlist')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="playlist-view">
    <div class="playlist-header">
      <div class="playlist-title">Мой плейлист</div>
      <div class="playlist-count" id="playlist-count">0 треков</div>
    </div>
    <div id="playlist-items"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<audio id="audio-player" preload="none"></audio>

<script>
const CLIENT_ID = '573dfb2bf40441b5857b99879471bc40';
const REDIRECT_URI = 'https://pthk345.github.io/Muswipe/';
const SCOPES = 'user-read-email user-read-private user-top-read user-read-recently-played';

let accessToken = null;
let trackQueue = [];
let currentTrack = null;
let isPlaying = false;
let activeCard = null;
let startX = 0, currentX = 0, isDragging = false;
let progressTimer = null;
let playlistTracks = JSON.parse(localStorage.getItem('muswipe_playlist') || '[]');

const audio = document.getElementById('audio-player');

// ─── AUTH (PKCE) ───
function startAuth() {
  const verifier = generateVerifier(128);
  sessionStorage.setItem('pkce_verifier', verifier);
  generateChallenge(verifier).then(challenge => {
    const p = new URLSearchParams({ client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI, scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge });
    window.location = `https://accounts.spotify.com/authorize?${p}`;
  });
}
function generateVerifier(n) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b => chars[b % chars.length]).join('');
}
async function generateChallenge(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, client_id: CLIENT_ID, code_verifier: verifier })
  });
  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem('muswipe_token', accessToken);
    if (data.refresh_token) localStorage.setItem('muswipe_refresh', data.refresh_token);
    return true;
  }
  return false;
}
async function doRefresh() {
  const r = localStorage.getItem('muswipe_refresh');
  if (!r) return false;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: r, client_id: CLIENT_ID })
  });
  const data = await res.json();
  if (data.access_token) { accessToken = data.access_token; localStorage.setItem('muswipe_token', accessToken); return true; }
  return false;
}

// ─── API ───
async function spotifyFetch(url) {
  let res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (res.status === 401) { await doRefresh(); res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } }); }
  return res.json();
}

// ─── LOAD TRACKS ───
async function loadTracks() {
  document.getElementById('loading').style.display = 'flex';
  document.querySelector('.loading-text').textContent = 'Подключаемся…';
  const queries = ['year:2024','year:2023','genre:pop','genre:hip-hop','genre:electronic','genre:indie','genre:r-n-b','tag:new'];
  const q = queries[Math.floor(Math.random() * queries.length)];
  const offset = Math.floor(Math.random() * 400);
  try {
    const data = await spotifyFetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=track&limit=50&offset=${offset}&market=RU`);
    if (data.error) {
      document.querySelector('.loading-text').textContent = '❌ ' + data.error.status + ': ' + data.error.message;
      return;
    }
    const tracks = (data.tracks?.items || []).filter(t => t && t.id);
    trackQueue.push(...tracks);
    if (tracks.length === 0) { document.querySelector('.loading-text').textContent = '❌ Треки не найдены'; return; }
  } catch(e) {
    document.querySelector('.loading-text').textContent = '❌ Ошибка: ' + e.message;
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('action-row').style.display = 'flex';
  if (trackQueue.length > 0) renderCard(trackQueue[0]);
}

// ─── RENDER CARD ───
function renderCard(track) {
  currentTrack = track;
  document.querySelectorAll('.track-card').forEach(el => el.remove());

  const img = track.album?.images?.[0]?.url || '';
  const title = track.name || 'Unknown';
  const artist = track.artists?.map(a => a.name).join(', ') || '';
  const hasPreview = !!track.preview_url;
  const duration = track.duration_ms ? formatTime(track.duration_ms / 1000) : '0:30';

  const card = document.createElement('div');
  card.className = 'track-card';
  card.innerHTML = `
    <div class="card-cover" style="background-image:url('${img}')"></div>
    <div class="swipe-hint-like" id="hint-like">❤ НРАВИТСЯ</div>
    <div class="swipe-hint-skip" id="hint-skip">✕ ПРОПУСТИТЬ</div>
    <div class="card-content">
      ${hasPreview ? '<div class="card-genre">Preview 30s</div>' : '<div class="no-preview-badge">Без превью</div>'}
      <div class="card-title">${title}</div>
      <div class="card-artist">${artist}</div>
    </div>
    <div class="mini-player">
      <div class="player-bar">
        <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <div class="progress-area">
          <div class="progress-track" onclick="seekAudio(event)">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-times">
            <span id="time-cur">0:00</span>
            <span id="time-dur">${hasPreview ? '0:30' : duration}</span>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('cards-stack').appendChild(card);
  activeCard = card;
  setupSwipe(card);

  // auto-play preview
  if (hasPreview) {
    audio.src = track.preview_url;
    audio.currentTime = 0;
    audio.play().then(() => { isPlaying = true; updatePlayBtn(); startProgress(); }).catch(() => {});
  } else {
    audio.src = '';
    isPlaying = false;
    updatePlayBtn();
  }
}

// ─── AUDIO ───
function togglePlay() {
  if (!currentTrack?.preview_url) { showToast('Нет превью для этого трека'); return; }
  if (audio.paused) {
    if (!audio.src || audio.src !== currentTrack.preview_url) audio.src = currentTrack.preview_url;
    audio.play().then(() => { isPlaying = true; updatePlayBtn(); startProgress(); });
  } else {
    audio.pause(); isPlaying = false; updatePlayBtn(); stopProgress();
  }
}

function startProgress() {
  stopProgress();
  progressTimer = setInterval(() => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    const fill = document.getElementById('progress-fill');
    const cur = document.getElementById('time-cur');
    if (fill) fill.style.width = pct + '%';
    if (cur) cur.textContent = formatTime(audio.currentTime);
    if (audio.ended) { stopProgress(); isPlaying = false; updatePlayBtn(); }
  }, 500);
}
function stopProgress() { clearInterval(progressTimer); }

function seekAudio(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}

function updatePlayBtn() {
  const icon = document.getElementById('play-icon');
  if (!icon) return;
  icon.innerHTML = isPlaying
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function formatTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ─── SWIPE ───
function setupSwipe(card) {
  card.addEventListener('touchstart', onStart, { passive: true });
  card.addEventListener('touchmove', onMove, { passive: false });
  card.addEventListener('touchend', onEnd);
  card.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
}
function onStart(e) {
  isDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX; currentX = 0;
  if (activeCard) activeCard.style.transition = 'none';
}
function onMove(e) {
  if (!isDragging || !activeCard) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  activeCard.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.07}deg)`;
  const like = document.getElementById('hint-like');
  const skip = document.getElementById('hint-skip');
  if (like) like.style.opacity = currentX > 60 ? Math.min((currentX - 60) / 60, 1) : 0;
  if (skip) skip.style.opacity = currentX < -60 ? Math.min((-currentX - 60) / 60, 1) : 0;
}
function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  window.removeEventListener('mousemove', onMove);
  window.removeEventListener('mouseup', onEnd);
  if (!activeCard) return;
  activeCard.style.transition = '';
  if (currentX > 100) doLike();
  else if (currentX < -100) doSkip();
  else { activeCard.style.transform = ''; document.getElementById('hint-like').style.opacity=0; document.getElementById('hint-skip').style.opacity=0; }
  currentX = 0;
}

function nextCard() {
  audio.pause(); stopProgress();
  trackQueue.shift();
  if (trackQueue.length < 5) loadTracks();
  if (trackQueue.length > 0) setTimeout(() => renderCard(trackQueue[0]), 350);
}
function doLike() {
  if (!currentTrack || !activeCard) return;
  activeCard.classList.add('fly-right');
  addToPlaylist(currentTrack);
  showToast(`❤️ ${currentTrack.name}`);
  setTimeout(nextCard, 400);
}
function doSkip() {
  if (!activeCard) return;
  activeCard.classList.add('fly-left');
  setTimeout(nextCard, 400);
}

// ─── PLAYLIST ───
function addToPlaylist(track) {
  if (playlistTracks.find(t => t.id === track.id)) return;
  playlistTracks.push({
    id: track.id, uri: track.uri,
    name: track.name,
    artist: track.artists?.map(a => a.name).join(', '),
    image: track.album?.images?.[1]?.url || track.album?.images?.[0]?.url || '',
    preview: track.preview_url || null
  });
  localStorage.setItem('muswipe_playlist', JSON.stringify(playlistTracks));
}
function removeFromPlaylist(id) {
  playlistTracks = playlistTracks.filter(t => t.id !== id);
  localStorage.setItem('muswipe_playlist', JSON.stringify(playlistTracks));
  updatePlaylistView();
}
function playFromPlaylist(preview) {
  if (!preview) { showToast('Нет превью'); return; }
  audio.src = preview; audio.play();
  isPlaying = true; startProgress();
}
function updatePlaylistView() {
  const el = document.getElementById('playlist-items');
  document.getElementById('playlist-count').textContent = `${playlistTracks.length} треков`;
  if (!playlistTracks.length) {
    el.innerHTML = `<div class="empty-playlist"><p>Листай треки и нажимай ❤️<br>— они появятся здесь</p></div>`;
    return;
  }
  el.innerHTML = playlistTracks.map(t => `
    <div class="playlist-item" onclick="playFromPlaylist('${t.preview||''}')">
      <img class="pi-thumb" src="${t.image}" onerror="this.style.background='#222'" />
      <div class="pi-info">
        <div class="pi-title">${t.name}</div>
        <div class="pi-artist">${t.artist}</div>
      </div>
      <button class="pi-remove" onclick="event.stopPropagation();removeFromPlaylist('${t.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>`).join('');
}

// ─── UI ───
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='swipe')||(i===1&&tab==='playlist')));
  document.getElementById('swipe-view').style.display = tab==='swipe' ? 'flex' : 'none';
  const pv = document.getElementById('playlist-view');
  pv.style.display = tab==='playlist' ? 'flex' : 'none';
  if (tab==='playlist') updatePlaylistView();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ───
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    window.history.replaceState({}, '', REDIRECT_URI);
    const ok = await exchangeCode(code);
    alert("code ok: " + ok + " token: " + (accessToken ? accessToken.slice(0,15) : "null")); if (!ok) { alert("Ошибка авторизации"); return; }
  } else {
    const saved = localStorage.getItem('muswipe_token');
    if (saved) {
      accessToken = saved;
      const ok = await doRefresh();
      if (!ok) { showAuth(); return; }
    } else { showAuth(); return; }
  }
  showApp();
}
function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadTracks();
}

init();
</script>
</body>
